<section id="contact" class="section contact-section">
    <div class="container">
        <h2 class="section-title">Contactez-nous</h2>
        <p class="section-subtitle">Une question, une suggestion ou envie de nous rejoindre ? Écrivez-nous !</p>

        <div class="contact-content">
            <form class="contact-form" id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom *</label>
                        <input type="text" id="nom" name="nom" required placeholder="Votre nom">
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom *</label>
                        <input type="text" id="prenom" name="prenom" required placeholder="Votre prénom">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="sujet">Sujet</label>
                    <select id="sujet" name="sujet">
                        <option value="information">Demande d'information</option>
                        <option value="adhesion">Adhésion</option>
                        <option value="benevolat">Devenir bénévole</option>
                        <option value="suggestion">Suggestion</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Votre message..."></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                    Envoyer le message
                </button>
            </form>

            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div>
                        <h4>E-mail</h4>
                        <a href="mailto:lesparentsdepennac@gmail.com">lesparentsdepennac@gmail.com</a>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    </div>
                    <div>
                        <h4>Adresse</h4>
                        <p>École Pennac<br>Rue de l'École, 75000 Paris</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div>
                        <h4>Permanences</h4>
                        <p>Mardi et jeudi<br>16h30 - 18h00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
