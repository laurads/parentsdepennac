<section id="contact" class="section contact-section">
    <div class="container">
        <h2 class="section-title">Contactez-nous</h2>
        <p class="section-subtitle">Une question, une suggestion ou envie de nous rejoindre ? Écrivez-nous !</p>

        <div class="contact-content">
            <form class="contact-form" id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom *</label>
                        <input type="text" id="nom" name="nom" required placeholder="Votre nom">
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom *</label>
                        <input type="text" id="prenom" name="prenom" required placeholder="Votre prénom">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="sujet">Sujet</label>
                    <select id="sujet" name="sujet">
                        <option value="information">Demande d'information</option>
                        <option value="adhesion">Adhésion</option>
                        <option value="benevolat">Devenir bénévole</option>
                        <option value="suggestion">Suggestion</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Votre message..."></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <img src="images/icon-send.svg" alt="" width="20" height="20">
                    Envoyer le message
                </button>
            </form>

            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">
                        <img src="images/icon-email.svg" alt="E-mail" width="28" height="28">
                    </div>
                    <div>
                        <h4>E-mail</h4>
                        <a href="mailto:lesparentsdepennac@gmail.com">lesparentsdepennac@gmail.com</a>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <img src="images/icon-location.svg" alt="Adresse" width="28" height="28">
                    </div>
                    <div>
                        <h4>Adresse</h4>
                        <p>École Pennac<br>Rue de l'École, 75000 Paris</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <img src="images/icon-schedule.svg" alt="Horaires" width="28" height="28">
                    </div>
                    <div>
                        <h4>Permanences</h4>
                        <p>Mardi et jeudi<br>16h30 - 18h00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
